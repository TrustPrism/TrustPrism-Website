version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: trustprism-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trustuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trustpass}
      POSTGRES_DB: ${POSTGRES_DB:-trustprism}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trustuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: trustprism-backend
    restart: always
    env_file:
      - backend/.env
    environment:
      - DB_HOST=postgres
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: trustprism-frontend
    restart: always
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  pgdata:
